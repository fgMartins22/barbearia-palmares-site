<!-- SERVIÇOS -->
<section id="servicos" class="section services">
  <div class="container">
    <div class="text-center">
      <span class="section-tag">O que fazemos</span>
      <h2 class="section-title">Nossos serviços</h2>
      <p class="section-subtitle">
        Serviços completos para manter o seu visual sempre no ponto. Valores de
        referência — confirme no agendamento.
      </p>
    </div>

    <!-- CARDS DE SERVIÇO -->
    <div class="services-grid">
      <article class="service-card card" *ngFor="let s of servicos">
        <div class="service-icone">
          <svg [lucideIcon]="s.icone" class="icon icon-lg"></svg>
        </div>
        <h3>{{ s.titulo }}</h3>
        <p>{{ s.descricao }}</p>
        <div class="service-footer">
          <span class="service-preco">{{ s.preco }}</span>
          <a
            class="btn btn-outline btn-sm"
            [href]="whatsapp"
            target="_blank"
            rel="noopener"
            >Agendar</a
          >
        </div>
      </article>
    </div>
  </div>
</section>
