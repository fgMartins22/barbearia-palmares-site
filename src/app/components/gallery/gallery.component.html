<!-- GALERIA (CARROSSEL) -->
<section id="galeria" class="section gallery">
  <div class="container">
    <div class="text-center">
      <span class="section-tag">Galeria</span>
      <h2 class="section-title">Nosso trabalho e ambiente</h2>
      <p class="section-subtitle">
        Uma prévia dos cortes e do espaço. Em breve, com fotos reais da
        barbearia.
      </p>
    </div>

    <!-- Carrossel: pausa o autoplay ao passar o mouse -->
    <div
      class="carousel"
      (mouseenter)="stopAutoplay()"
      (mouseleave)="startAutoplay()"
    >
      <!-- VIEWPORT + TRILHA -->
      <div class="carousel-viewport">
        <div
          class="carousel-track"
          [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
        >
          <figure class="carousel-slide" *ngFor="let img of galeria">
            <!-- [EDITAR] Se houver foto real (url preenchida em mock-data.ts), mostra a imagem -->
            <img
              *ngIf="img.url; else placeholder"
              [src]="img.url"
              [alt]="img.legenda"
            />

            <!-- Caso contrário, mostra um placeholder -->
            <ng-template #placeholder>
              <div class="slide-placeholder">
                <svg lucideIcon="image" class="icon icon-lg"></svg>
                <span>Sua foto aqui</span>
              </div>
            </ng-template>

            <figcaption>{{ img.legenda }}</figcaption>
          </figure>
        </div>

        <!-- SETAS -->
        <button
          type="button"
          class="carousel-arrow prev"
          (click)="prev()"
          aria-label="Slide anterior"
        >
          <svg lucideIcon="chevron-left" class="icon"></svg>
        </button>
        <button
          type="button"
          class="carousel-arrow next"
          (click)="next()"
          aria-label="Próximo slide"
        >
          <svg lucideIcon="chevron-right" class="icon"></svg>
        </button>
      </div>

      <!-- INDICADORES -->
      <div class="carousel-dots">
        <button
          type="button"
          *ngFor="let img of galeria; let i = index"
          class="dot"
          [class.active]="i === currentIndex"
          (click)="goTo(i)"
          [attr.aria-label]="'Ir para o slide ' + (i + 1)"
        ></button>
      </div>
    </div>
  </div>
</section>
